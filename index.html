<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deep Sea System - UTF8 Secure</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --aqua: #00f2fe;
      --blue: #4facfe;
      --deep: #000a1a;
      --glass: rgba(255, 255, 255, 0.03);
      --glow: rgba(0, 242, 254, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: var(--deep);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
      pointer-events: none;
    }

    .ocean-box {
      position: relative;
      width: 92%;
      max-width: 420px;
      padding: 3.5rem 2rem;
      background: var(--glass);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      animation: emerge 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes emerge {
      from { opacity: 0; transform: translateY(50px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .shake { animation: shakeEffect 0.4s ease-in-out; }
    @keyframes shakeEffect {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(0.97) rotate(-1deg); }
      75% { transform: scale(1.03) rotate(1deg); }
    }

    h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: var(--aqua);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .pw-wrapper {
      background: rgba(0, 0, 0, 0.5);
      padding: 2.5rem 1rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 242, 254, 0.15);
      margin-bottom: 2.5rem;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    #password {
      color: white;
      font-size: clamp(1.2rem, 6vw, 2.2rem);
      font-weight: 800;
      word-break: break-all;
      text-shadow: 0 0 20px var(--glow);
      line-height: 1.4;
    }

    .btn-water {
      width: 100%;
      height: 65px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--blue), var(--aqua));
      color: #000;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.4s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-water:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px var(--glow);
    }

    .stats {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
    }

    .stats span { color: var(--aqua); font-weight: 600; }

    .notification {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      z-index: 1000;
      transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .notification.show { top: 30px; }

    .ripple {
      position: absolute;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      animation: rippleAnim 0.8s ease-out;
    }

    @keyframes rippleAnim {
      from { width: 0; height: 0; opacity: 1; }
      to { width: 400px; height: 400px; opacity: 0; }
    }
  </style>
</head>
<body onload="init()">

  <canvas id="canvas"></canvas>

  <div class="ocean-box" id="card">
    <h3>Data Key</h3>
    <div class="pw-wrapper">
      <div id="password">LOADING...</div>
    </div>
    <button class="btn-water" onclick="copyStream(event)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      SAO CHÉP MÃ
    </button>

    <div class="stats">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      Lượt xem: <span id="count">0</span>
    </div>
  </div>

  <div class="notification" id="toast">🌊 ĐÃ SAO CHÉP!</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 20;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random() * 0.4;
      }
      update() {
        this.y -= this.speedY;
        if (this.y < -20) this.reset();
      }
      draw() {
        ctx.fillStyle = `rgba(0, 242, 254, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    // --- FIX ĐỊNH DẠNG UTF-8 TẠI ĐÂY ---
    function hexToUtf8(hex) {
      if (!hex) return "ACCESS DENIED";
      try {
        // Bước 1: Chuyển hex thành chuỗi %XX (URL Encode format)
        let percentStr = "";
        for (let i = 0; i < hex.length; i += 2) {
          percentStr += "%" + hex.substr(i, 2);
        }

        // Bước 2: Dùng decodeURIComponent để giải mã chuẩn UTF-8
        let decoded = decodeURIComponent(percentStr);

        // Bước 3: Lọc số nếu chuỗi quá dài (theo yêu cầu cũ của bạn)
        if (hex.length >= 30) {
            return decoded.replace(/\D/g, ""); // Chỉ lấy số
        }
        return decoded;
      } catch (e) {
        // Nếu lỗi decode (do hex không chuẩn UTF-8), quay về cách cũ để chữa cháy
        try {
          let str = "";
          for (let i = 0; i < hex.length; i += 2) {
            str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
          }
          return str;
        } catch (e2) { return "ERROR"; }
      }
    }

    async function updateViewCount() {
      try {
        const res = await fetch('https://api.countapi.xyz/hit/bannei19_v3/visits');
        const data = await res.json();
        document.getElementById('count').innerText = data.value.toLocaleString();
      } catch (e) {
        document.getElementById('count').innerText = "1,024";
      }
    }

    function init() {
      const params = new URLSearchParams(window.location.search);
      const hex = params.get("pw");
      document.getElementById("password").innerText = hexToUtf8(hex);
      for (let i = 0; i < 60; i++) particles.push(new Particle());
      animate();
      updateViewCount();
    }

    async function copyStream(e) {
      const text = document.getElementById("password").innerText;
      if(["ACCESS DENIED", "ERROR", "EMPTY", "LOADING..."].includes(text)) return;

      let ripple = document.createElement('span');
      ripple.className = 'ripple';
      e.target.appendChild(ripple);
      let rect = e.target.getBoundingClientRect();
      ripple.style.left = `${e.clientX - rect.left}px`;
      ripple.style.top = `${e.clientY - rect.top}px`;
      setTimeout(() => ripple.remove(), 800);

      await navigator.clipboard.writeText(text);
      document.getElementById('card').classList.add('shake');
      setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);

      const toast = document.getElementById('toast');
      toast.classList.add('show');
      if (navigator.vibrate) navigator.vibrate(50);
      setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }
  </script>
</body>
</html>
