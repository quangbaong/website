<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Hệ Thống Xác Thực - Atlantis</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-cyan: #00f2fe;
      --primary-blue: #007deb;
      --deep-bg: #02050a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --text-glow: rgba(0, 242, 254, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: var(--deep-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
    }

    /* Hiệu ứng chạm tỏa giọt nước TOÀN MÀN HÌNH */
    .water-drop {
      position: absolute;
      border: 2px solid var(--primary-cyan);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: dropSpread 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      pointer-events: none; 
      z-index: 9999;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.5), inset 0 0 10px rgba(0, 242, 254, 0.3);
    }

    @keyframes dropSpread {
      0% { width: 0; height: 0; opacity: 1; border-width: 4px; }
      100% { width: 120px; height: 120px; opacity: 0; border-width: 0px; }
    }

    /* Canvas nền hạt nước lơ lửng */
    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Container chính */
    .ocean-card {
      position: relative;
      width: 90%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
      animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: scale(0.9) translateY(40px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-wrapper {
      width: 70px;
      height: 70px;
      margin: 0 auto 1.5rem;
      background: rgba(0, 242, 254, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--primary-cyan);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
    }

    h1 {
      color: white;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }

    /* Nút bấm Thủy Lực */
    .btn-action {
      position: relative;
      width: 100%;
      height: 65px;
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-cyan));
      border: none;
      border-radius: 20px;
      color: #000;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(0, 125, 235, 0.3);
      overflow: hidden;
    }

    .btn-action:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 242, 254, 0.5);
    }

    .btn-action:active { transform: scale(0.96); }

    /* Hiệu ứng tia chớp nước chạy qua nút */
    .btn-action::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: 0.6s;
    }

    .btn-action:hover::after { left: 100%; }

    /* Bộ đếm lượt truy cập */
    .view-counter {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
    }

    .count-num {
      color: var(--primary-cyan);
      font-weight: 600;
      text-shadow: 0 0 10px var(--text-glow);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      z-index: 1000;
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .toast.show { top: 30px; }

    /* Responsive cho màn hình nhỏ */
    @media (max-width: 400px) {
      .ocean-card { padding: 2.5rem 1.5rem; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body onload="init()">

  <canvas id="waterCanvas"></canvas>

  <div class="ocean-card">
    <div class="icon-wrapper">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    <h1>Security Gateway</h1>
    <p>Nhấn nút để khởi tạo mật mã an toàn</p>
    
    <button class="btn-action" onclick="handleStep(event)">
      BẤM ĐỂ TIẾP TỤC
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>

    <div class="view-counter">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      Lượt truy cập: <span id="count" class="count-num">...</span>
    </div>
  </div>

  <div id="toast" class="toast">🌊 Đang khơi thông dòng chảy...</div>

  <script>
    const link4m = "https://link4m.co/st?api=66b5a7bef0341f72583dedf9&url=";
    const baseNextStep = "https://bannei19.github.io/website/?pw="; 

    // --- HIỆU ỨNG CHẠM TỎA GIỌT NƯỚC ---
    document.addEventListener('click', function(e) {
      const drop = document.createElement('div');
      drop.className = 'water-drop';
      drop.style.left = e.clientX + 'px';
      drop.style.top = e.clientY + 'px';
      document.body.appendChild(drop);
      setTimeout(() => drop.remove(), 800);
    });

    // --- KHỞI TẠO HẠT NƯỚC ---
    const canvas = document.getElementById('waterCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 10;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random() * 0.4;
      }
      update() {
        this.y -= this.speedY;
        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.fillStyle = `rgba(0, 242, 254, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    // --- BỘ ĐẾM LƯỢT TRUY CẬP ---
    async function updateViewCount() {
      try {
        const res = await fetch('https://api.countapi.xyz/hit/bannei19_ocean/v1');
        const data = await res.json();
        document.getElementById('count').innerText = data.value.toLocaleString();
      } catch (e) {
        document.getElementById('count').innerText = Math.floor(Math.random() * 1000 + 500).toLocaleString();
      }
    }

    function getAbc() {
      const p = new URLSearchParams(window.location.search);
      return p.get("abc") || "";
    }

    // --- FIX LỖI NHẢY LINK ---
    function handleStep(e) {
      // Ngăn click lan ra ngoài để không bị 2 giọt nước trùng nhau
      if (e) e.stopPropagation(); 
      
      if (e) {
        const drop = document.createElement('div');
        drop.className = 'water-drop';
        drop.style.left = e.clientX + 'px';
        drop.style.top = e.clientY + 'px';
        document.body.appendChild(drop);
        setTimeout(() => drop.remove(), 800);
      }

      const abc = getAbc();
      const nextUrl = baseNextStep + encodeURIComponent(abc);
      const finalUrl = link4m + encodeURIComponent(nextUrl);
      
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      
      if (navigator.vibrate) navigator.vibrate(50);

      // Chuyển hướng TRỰC TIẾP bằng location.href (Không bị Safari/App chặn)
      setTimeout(() => {
        window.location.href = finalUrl; 
      }, 1000);
    }

    function init() {
      for (let i = 0; i < 60; i++) particles.push(new Particle());
      animate();
      updateViewCount();
    }
  </script>
</body>
</html>
