<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hệ Thống Xác Thực - Mệnh Thủy</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-ocean: #000814;
      --water-blue: #007deb;
      --aqua-glow: #00f2fe;
      --glass: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      font-family: 'Lexend', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--deep-ocean);
      overflow: hidden;
      position: relative;
    }

    /* Hiệu ứng nền nước động */
    body::before {
      content: "";
      position: absolute;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, #001d3d 0%, #000814 70%);
      z-index: -1;
    }

    .wave-container {
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0;
      opacity: 0.3;
      pointer-events: none;
    }

    /* Card giao diện xịn */
    .container {
      position: relative;
      width: 90%;
      max-width: 400px;
      padding: 40px 30px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-box {
      width: 80px;
      height: 80px;
      background: rgba(0, 125, 235, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      border: 2px solid var(--water-blue);
      box-shadow: 0 0 20px var(--glow);
    }

    h2 {
      color: white;
      font-size: 1.5rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    /* Nút bấm hiệu ứng nước chảy */
    .btn-next {
      position: relative;
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #007deb, #00f2fe);
      border: none;
      border-radius: 15px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(0, 125, 235, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-next:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
      letter-spacing: 1px;
    }

    .btn-next:active {
      transform: scale(0.96);
    }

    /* Hiệu ứng loading nhẹ */
    .btn-next::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }

    .btn-next:hover::after {
      left: 100%;
    }

    /* Thông báo chuyển hướng */
    .toast {
      position: fixed;
      bottom: 30px;
      background: rgba(0, 0, 0, 0.8);
      color: var(--aqua-glow);
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 14px;
      border: 1px solid var(--aqua-glow);
      display: none;
      animation: slideUp 0.4s ease forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
  <script>
    const link4m = "https://link4m.co/st?api=66b5a7bef0341f72583dedf9&url=";
    // Đã sửa thành link GitHub của bạn và đúng cấu trúc ?pw=
    let baseNextStep = "https://bannei19.github.io/website/?pw="; 

    function getParamAbc() {
      const params = new URLSearchParams(window.location.search);
      return params.get("abc") || "";
    }

    function nextStep() {
      const abcValue = getParamAbc();
      const finalUrl = baseNextStep + encodeURIComponent(abcValue);
      
      // Hiệu ứng thông báo trước khi chuyển hướng
      document.getElementById('toast').style.display = 'block';
      
      setTimeout(() => {
        window.open(link4m + encodeURIComponent(finalUrl), "_blank");
        // Reset lại trang hiện tại để tránh loop
        window.location.href = "about:blank"; 
      }, 800);
    }
  </script>
</head>
<body>

  <div class="container">
    <div class="icon-box">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    <h2>Xác Minh Tiếp Tục</h2>
    <p>Vui lòng nhấn nút bên dưới để nhận mật mã an toàn của bạn.</p>
    
    <button class="btn-next" onclick="nextStep()">
      TIẾP TỤC NGAY
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <div id="toast" class="toast">🌊 Đang khởi tạo dòng chảy dữ liệu...</div>

</body>
</html>
